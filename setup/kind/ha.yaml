# kind cluster configuration: High Availability (3 control-plane, 3 workers)
# Suitable for: Part 2 HA demonstrations, control plane resilience testing

kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: workshop-ha

nodes:
  # Control plane node 1
  - role: control-plane
    extraPortMappings:
      - containerPort: 80
        hostPort: 80
        protocol: TCP
      - containerPort: 443
        hostPort: 443
        protocol: TCP

  # Control plane node 2
  - role: control-plane

  # Control plane node 3
  - role: control-plane

  # Worker node 1
  - role: worker
    kubeadmConfigPatches:
      - |
        kind: JoinConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "node-type=worker,zone=zone-a"

  # Worker node 2
  - role: worker
    kubeadmConfigPatches:
      - |
        kind: JoinConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "node-type=worker,zone=zone-b"

  # Worker node 3
  - role: worker
    kubeadmConfigPatches:
      - |
        kind: JoinConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "node-type=worker,zone=zone-c"
