# Secret for sensitive data
# Note: Values must be base64 encoded
# echo -n 'mypassword' | base64
apiVersion: v1
kind: Secret
metadata:
  name: db-credentials
type: Opaque
data:
  username: YWRtaW4=           # admin
  password: bXlwYXNzd29yZA==   # mypassword
  connection-string: cG9zdGdyZXM6Ly9hZG1pbjpteXBhc3N3b3JkQHBvc3RncmVzOjU0MzIvbXlhcHA=
---
# Secret using stringData (no encoding needed)
apiVersion: v1
kind: Secret
metadata:
  name: api-keys
type: Opaque
stringData:
  api-key: "sk-1234567890abcdef"
  api-secret: "secret-key-here"
  webhook-token: "webhook-token-123"
---
# Deployment using Secrets
apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-with-secrets
spec:
  replicas: 2
  selector:
    matchLabels:
      app: myapp
  template:
    metadata:
      labels:
        app: myapp
    spec:
      containers:
      - name: app
        image: busybox:1.36
        command: ["/bin/sh", "-c"]
        args:
          - |
            echo "App started with credentials:"
            echo "Username: $DB_USERNAME"
            echo "API Key: $API_KEY"
            echo "Reading connection string from file:"
            cat /etc/secrets/connection-string
            echo ""
            echo "Sleeping..."
            sleep 3600
        env:
        # Individual secrets as environment variables
        - name: DB_USERNAME
          valueFrom:
            secretKeyRef:
              name: db-credentials
              key: username
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: db-credentials
              key: password
        # All keys from another secret
        envFrom:
        - secretRef:
            name: api-keys
            prefix: API_
        volumeMounts:
        # Mount secrets as files
        - name: db-secret-volume
          mountPath: /etc/secrets
          readOnly: true
      volumes:
      - name: db-secret-volume
        secret:
          secretName: db-credentials
          items:
          - key: connection-string
            path: connection-string
