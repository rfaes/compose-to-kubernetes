name: Validate Workshop Content

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  validate-yaml:
    name: Validate Kubernetes YAML
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up kubectl
      uses: azure/setup-kubectl@v3
      with:
        version: 'latest'
    
    - name: Validate Part 1 YAML files
      run: |
        echo "Validating Part 1 manifests..."
        find part-1 -name "*.yaml" -type f | while read file; do
          echo "Checking $file"
          kubectl apply --dry-run=client -f "$file" || echo "Warning: $file may need review"
        done
    
    - name: Validate Part 2 YAML files
      run: |
        echo "Validating Part 2 manifests..."
        find part-2 -name "*.yaml" -type f | while read file; do
          echo "Checking $file"
          kubectl apply --dry-run=client -f "$file" || echo "Warning: $file may need review"
        done

  lint-markdown:
    name: Lint Markdown
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    
    - name: Install markdownlint
      run: npm install -g markdownlint-cli
    
    - name: Lint markdown files
      run: |
        markdownlint '**/*.md' --ignore node_modules --ignore .github || true

  check-links:
    name: Check Broken Links
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Check links in markdown
      uses: gaurav-nelson/github-action-markdown-link-check@v1
      with:
        use-quiet-mode: 'yes'
        config-file: '.github/markdown-link-check-config.json'
        
  test-docker-build:
    name: Test Workshop Container Build
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Build workshop container
      uses: docker/build-push-action@v5
      with:
        context: ./setup
        file: ./setup/Dockerfile
        push: false
        tags: k8s-workshop-tools:test
        cache-from: type=gha
        cache-to: type=gha,mode=max

  validate-helm-charts:
    name: Validate Helm Charts
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Helm
      uses: azure/setup-helm@v3
      with:
        version: 'latest'
    
    - name: Lint Helm charts
      run: |
        echo "Checking for Helm charts..."
        find . -name "Chart.yaml" -type f | while read chart; do
          chart_dir=$(dirname "$chart")
          echo "Linting chart in $chart_dir"
          helm lint "$chart_dir" || echo "Warning: Chart in $chart_dir needs review"
        done
